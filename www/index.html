<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Reva</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #F5F0E8;
        font-family: -apple-system, system-ui, sans-serif;
        display: grid;
        place-items: center;
        color: #1a1a1a;
      }
      .box { text-align: center; }
      .dot { animation: pulse 1.2s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    </style>
  </head>
  <body>
    <div class="box">
      <h1 style="font-size:28px;margin:0 0 8px">Reva</h1>
      <p class="dot">Conectando…</p>
    </div>
  </body>
</html>
